<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>看一眼</title>
  <style>
    /* 透明背景，悬浮在任务栏之上 */
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }
    /* 嵌入任务栏：背景全透明，直接显示在任务栏上，像是任务栏的一部分。
       白字 + 描边阴影保证在深/浅色任务栏上都可读（无 macOS 的 template 反相机制）。 */
    #bar {
      box-sizing: border-box;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 1px 4px;
      background: transparent;
      color: #fff;
      font: 700 12px/1.25 ui-monospace, "Cascadia Mono", Consolas, "Courier New", monospace;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 2px rgba(0, 0, 0, 0.95), 0 1px 1px rgba(0, 0, 0, 0.8);
    }
    /* white-space: pre 保留右对齐的占位空格，使两行逐列对齐（同 macOS 位图布局） */
    .row {
      white-space: pre;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="bar">
    <div class="row" id="row1">c--% m--%</div>
    <div class="row" id="row2">↓-- ↑ --</div>
  </div>
  <script>
    const { listen } = window.__TAURI__.event;
    const { invoke } = window.__TAURI__.core;

    // 监听 Rust 后台线程每秒推送的两行文本，直接整行替换以保留对齐空格
    listen("metrics", (e) => {
      document.getElementById("row1").textContent = e.payload.row1;
      document.getElementById("row2").textContent = e.payload.row2;
    });

    // 拖动定位：pointer 事件 → IPC 实时移动原生窗口；松开时存盘。
    // screenX 是 CSS 像素，乘 devicePixelRatio 换算成物理像素（原生窗口用物理像素）。
    const bar = document.getElementById("bar");
    bar.style.cursor = "move";
    let dragging = false;
    let lastX = 0;
    bar.addEventListener("pointerdown", (e) => {
      dragging = true;
      lastX = e.screenX;
      try { bar.setPointerCapture(e.pointerId); } catch (_) {}
      e.preventDefault();
    });
    bar.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      const cssDx = e.screenX - lastX;
      if (cssDx !== 0) {
        lastX = e.screenX;
        invoke("move_widget", { dx: Math.round(cssDx * window.devicePixelRatio) });
      }
    });
    const endDrag = (e) => {
      if (!dragging) return;
      dragging = false;
      try { bar.releasePointerCapture(e.pointerId); } catch (_) {}
      invoke("save_widget_pos");
    };
    bar.addEventListener("pointerup", endDrag);
    bar.addEventListener("pointercancel", endDrag);
  </script>
</body>
</html>
