<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>看一眼</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }
    /* DEBUG-drag：临时给明显深色背景，验证"透明区域点击穿透"假设 + 提供清晰抓取区 */
    #bar {
      box-sizing: border-box;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 1px 4px;
      background: rgba(40, 40, 40, 0.6);
      color: #fff;
      font: 700 12px/1.25 ui-monospace, "Cascadia Mono", Consolas, "Courier New", monospace;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 2px rgba(0, 0, 0, 0.95), 0 1px 1px rgba(0, 0, 0, 0.8);
    }
    .row {
      white-space: pre;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="bar">
    <div class="row" id="row1">c--% m--%</div>
    <div class="row" id="row2">↓-- ↑ --</div>
  </div>
  <script>
    const { listen } = window.__TAURI__.event;
    const { invoke } = window.__TAURI__.core;
    const row1 = document.getElementById("row1");
    const row2 = document.getElementById("row2");
    const bar = document.getElementById("bar");

    // ── DEBUG-drag：诊断仪表 ───────────────────────────────────────────────
    // 交互期间把"发生了什么"直接写到两行文字里；diag 为真时暂停指标覆盖。
    let diag = false;
    let diagTimer = null;
    function setDiag(a, b) {
      diag = true;
      row1.textContent = a;
      row2.textContent = b;
      if (diagTimer) clearTimeout(diagTimer);
      diagTimer = setTimeout(() => { diag = false; }, 5000);
    }

    listen("metrics", (e) => {
      if (diag) return; // 诊断期间不被每秒指标覆盖
      row1.textContent = e.payload.row1;
      row2.textContent = e.payload.row2;
    });

    // 任何鼠标交互的探针（区分 pointer / mouse / click 是否触达 webview）
    bar.addEventListener("click", () => setDiag("CLICK ok", "tap"));
    bar.addEventListener("mousedown", () => setDiag("MOUSE dn", "ok"));

    // ── 拖动 ───────────────────────────────────────────────────────────────
    bar.style.cursor = "move";
    let dragging = false;
    let lastX = 0;
    let moves = 0;

    bar.addEventListener("pointerdown", (e) => {
      dragging = true;
      lastX = e.screenX;
      moves = 0;
      bar.style.background = "rgba(200, 0, 0, 0.85)"; // 按下变红
      setDiag("PTR dn", "ok");
      try { bar.setPointerCapture(e.pointerId); } catch (_) {}
      e.preventDefault();
    });

    bar.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      const cssDx = e.screenX - lastX;
      if (cssDx !== 0) {
        lastX = e.screenX;
        moves++;
        const dx = Math.round(cssDx * (window.devicePixelRatio || 1));
        setDiag("MV " + moves, "dx " + dx);
        invoke("move_widget", { dx })
          .catch((err) => setDiag("INV ERR", String(err).slice(0, 12)));
      }
    });

    const endDrag = (e) => {
      if (!dragging) return;
      dragging = false;
      bar.style.background = "rgba(40, 40, 40, 0.6)";
      try { bar.releasePointerCapture(e.pointerId); } catch (_) {}
      invoke("save_widget_pos")
        .catch((err) => setDiag("SAVE ERR", String(err).slice(0, 12)));
    };
    bar.addEventListener("pointerup", endDrag);
    bar.addEventListener("pointercancel", endDrag);
  </script>
</body>
</html>
