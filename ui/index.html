<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>看一眼</title>
  <style>
    /* 透明背景，悬浮在任务栏之上 */
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }
    /* 与 macOS 菜单栏同款：两行等宽文本，白字。
       深色半透明胶囊保证在浅色任务栏上也可读（macOS 靠 template 反相，Windows 无此机制）。 */
    #bar {
      box-sizing: border-box;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2px 7px;
      background: rgba(20, 20, 20, 0.72);
      border-radius: 7px;
      color: #fff;
      font: 700 13px/1.18 ui-monospace, "Cascadia Mono", Consolas, "Courier New", monospace;
      font-variant-numeric: tabular-nums;
    }
    /* white-space: pre 保留右对齐的占位空格，使两行逐列对齐（同 macOS 位图布局） */
    .row {
      white-space: pre;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="bar">
    <div class="row" id="row1">c--%m--%</div>
    <div class="row" id="row2">↓--↑ --</div>
  </div>
  <script>
    // 监听 Rust 后台线程每秒推送的两行文本，直接整行替换以保留对齐空格
    const { listen } = window.__TAURI__.event;
    listen("metrics", (e) => {
      document.getElementById("row1").textContent = e.payload.row1;
      document.getElementById("row2").textContent = e.payload.row2;
    });
  </script>
</body>
</html>
