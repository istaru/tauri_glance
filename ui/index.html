<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>看一眼</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }
    /* 外层：透明、铺满整窗，作为拖动抓取区（整窗任意处都能抓）。
       靠右排布 → 内层药丸紧贴右侧的 ^ 箭头。 */
    #bar {
      box-sizing: border-box;
      height: 100vh;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      cursor: move;
    }
    /* 内层：可见的淡底药丸，宽度自适应内容（fit-content），不再铺满整窗。 */
    #pill {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: fit-content;
      padding: 1px 4px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.10);
      color: #fff;
      font: 700 12px/1.25 ui-monospace, "Cascadia Mono", Consolas, "Courier New", monospace;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 2px rgba(0, 0, 0, 0.95), 0 1px 1px rgba(0, 0, 0, 0.8);
    }
    .row {
      white-space: pre;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="bar">
    <div id="pill">
      <div class="row" id="row1">↑ --  c --%</div>
      <div class="row" id="row2">↓ --  m --%</div>
    </div>
  </div>
  <script>
    const { listen } = window.__TAURI__.event;
    const { invoke } = window.__TAURI__.core;
    const row1 = document.getElementById("row1");
    const row2 = document.getElementById("row2");
    const bar = document.getElementById("bar");

    // 每秒推来的读数（row1/row2 已由后端 format_rows() 逐字符对齐）
    listen("metrics", (e) => {
      row1.textContent = e.payload.row1;
      row2.textContent = e.payload.row2;
    });

    // ── 点击类事件：左键只用于拖动、右键弹菜单，其余一律吃掉 ─────────────────
    // click / 双击 / 中键全部吃掉，widget 不响应普通“点击”。
    ["click", "dblclick", "auxclick"].forEach((t) => {
      document.addEventListener(t, (e) => { e.preventDefault(); e.stopPropagation(); }, true);
    });

    // 右键：不弹浏览器菜单，改为让原生弹出应用菜单（开机启动 / 退出）。
    // 替代原来的托盘图标——Windows 已去掉托盘，这是菜单的唯一入口。
    document.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      invoke("show_widget_menu").catch(() => {});
    });

    // ── 拖动（水平锁行，且仅在真正移动后才算/才存）──────────────────────────
    // 无系统标题栏，用 pointer 事件手搓：整窗都是抓取区。
    // 纯按下不动 = 点击 → 什么都不做（不存位置）。
    let dragging = false;
    let moved = false;
    let lastX = 0;

    bar.addEventListener("pointerdown", (e) => {
      if (e.button !== 0) return; // 只左键拖动；右键留给菜单
      dragging = true;
      moved = false;
      lastX = e.screenX;
      try { bar.setPointerCapture(e.pointerId); } catch (_) {}
      e.preventDefault();
    });

    bar.addEventListener("pointermove", (e) => {
      if (!dragging) return;
      const cssDx = e.screenX - lastX;
      if (cssDx !== 0) {
        lastX = e.screenX;
        moved = true;
        const dx = Math.round(cssDx * (window.devicePixelRatio || 1));
        invoke("move_widget", { dx }).catch(() => {});
      }
    });

    const endDrag = (e) => {
      if (!dragging) return;
      dragging = false;
      try { bar.releasePointerCapture(e.pointerId); } catch (_) {}
      if (moved) invoke("save_widget_pos").catch(() => {}); // 纯点击不存位置
    };
    bar.addEventListener("pointerup", endDrag);
    bar.addEventListener("pointercancel", endDrag);
  </script>
</body>
</html>
