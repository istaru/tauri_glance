name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: bash build_app.sh

      - name: Zip artifact
        run: zip -r SwiftGlance.zip SwiftGlance.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftGlance-${{ github.sha }}
          path: SwiftGlance.zip
          retention-days: 30

      # 仅在推送 v* tag 时创建 GitHub Release
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SwiftGlance.zip
          generate_release_notes: true
