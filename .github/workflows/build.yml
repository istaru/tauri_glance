name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: bash build_app.sh

      - name: Zip artifact
        run: zip -r SwiftGlance.zip SwiftGlance.app

      # 每次推送 main 时，更新 latest 预发布（Releases 区域始终有最新包）
      - name: Update latest pre-release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: SwiftGlance.zip
          body: |
            自动构建自 `main` 分支最新提交。

            **Commit:** `${{ github.sha }}`
            **构建时间:** ${{ github.event.head_commit.timestamp }}

            > 这是持续集成自动生成的预发布版本，正式版本请见下方 Tags。

      # 推送 v* tag 时创建正式版 Release
      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SwiftGlance.zip
          generate_release_notes: true
