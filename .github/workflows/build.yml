name: Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build universal app bundle
        run: bash build_app.sh ${{ steps.version.outputs.VERSION }}

      - name: Zip artifact
        run: zip -r SwiftGlance.zip SwiftGlance.app

      # PR 只验证能否编译，不发布 Release
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "v${{ steps.version.outputs.VERSION }}"
          files: SwiftGlance.zip
          generate_release_notes: true
